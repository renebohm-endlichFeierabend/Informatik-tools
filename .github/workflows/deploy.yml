name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/javawelt/package-lock.json

      - name: Build static tools
        run: |
          mkdir -p dist
          cp index.html dist/index.html
          cp java_analyse_tool.html dist/java_analyse_tool.html
          sed -i "s|__MISTRAL_API_KEY__|${{ secrets.MISTRAL_KEY }}|g" dist/java_analyse_tool.html

      - name: Build JavaWelt (Vite-App)
        working-directory: apps/javawelt
        run: |
          npm ci
          npm run build

      - name: Bundle JavaWelt into site
        run: |
          mkdir -p dist/javawelt
          cp -r apps/javawelt/dist/. dist/javawelt/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
